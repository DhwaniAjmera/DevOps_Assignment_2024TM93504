apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest
      version: v1
  template:
    metadata:
      labels:
        app: aceest
        version: v1
    spec:
      containers:
      - name: aceest-container
        image: dhwaniajmera/aceest-fitness:v1
        ports:
        - containerPort: 5000