apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest
      version: canary
  template:
    metadata:
      labels:
        app: aceest
        version: canary
    spec:
      containers:
      - name: aceest-container
        image: dhwaniajmera/aceest-fitness:v2
        ports:
        - containerPort: 5000